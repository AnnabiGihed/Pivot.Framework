name: Tests & Coverage

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  workflow_call:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.x'

    - name: Restore dependencies
      run: dotnet restore Pivot.Framework.sln

    - name: Build
      run: dotnet build Pivot.Framework.sln --no-restore --configuration Release

    - name: Run tests with coverage
      run: |
        dotnet test Pivot.Framework.sln --no-build --configuration Release \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults \
          --logger "trx;LogFileName=test-results.trx"

    - name: Install ReportGenerator
      run: dotnet tool install --global dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:"./TestResults/**/coverage.cobertura.xml" \
          -targetdir:"./TestResults/CoverageReport" \
          -reporttypes:"Html;Cobertura" \
          -assemblyfilters:"+Pivot.Framework.Domain;+Pivot.Framework.Application;+Pivot.Framework.Containers.API;+Pivot.Framework.Infrastructure.Abstraction" \
          -classfilters:"-*.Migrations.*;-*AssemblyReference*;-*.Designer*" \
          -filefilters:"-*.g.cs" \
          -mergehistory

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: ./TestResults/test-results.trx

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: ./TestResults/CoverageReport

    - name: Publish test results
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: xUnit Test Results
        path: ./TestResults/test-results.trx
        reporter: dotnet-trx
        fail-on-error: true

    - name: Code coverage summary
      uses: irongut/CodeCoverageSummary@v1.3.0
      with:
        filename: ./TestResults/CoverageReport/Cobertura.xml
        badge: true
        fail_below_min: false
        format: markdown
        output: both
        thresholds: '60 80'

    - name: Write coverage to job summary
      if: always()
      run: |
        if [ -f code-coverage-results.md ]; then
          cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY
        else
          echo "Coverage report not generated" >> $GITHUB_STEP_SUMMARY
        fi

    - name: Add coverage to PR
      uses: marocchino/sticky-pull-request-comment@v2
      if: github.event_name == 'pull_request'
      with:
        recreate: true
        path: code-coverage-results.md